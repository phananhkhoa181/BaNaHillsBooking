<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập (Local Test) - Ba Na Hills</title>
    <link rel="icon" type="image/png" href="assets/images/logosunworld.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/staff.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="staff-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-user-shield"></i>
                <h1>Đăng Nhập Nhân Viên</h1>
                <p>Hệ thống quản lý hàng đợi (LOCAL TEST MODE)</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i> Tên đăng nhập
                    </label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        required 
                        placeholder="Nhập: admin"
                        value="admin"
                        autocomplete="username"
                    />
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Mật khẩu
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required 
                        placeholder="Nhập: 123456"
                        value="123456"
                        autocomplete="current-password"
                    />
                </div>

                <div class="error-message" id="loginError" style="display: none;">
                    <i class="fas fa-exclamation-circle"></i>
                    <span>Tên đăng nhập hoặc mật khẩu không đúng!</span>
                </div>

                <div style="background: #fff3cd; padding: 10px; border-radius: 5px; margin-bottom: 15px;">
                    <strong>⚠️ Test Mode:</strong> Không cần Firebase, dùng localStorage
                </div>

                <button type="submit" class="btn btn-primary btn-login">
                    <i class="fas fa-sign-in-alt"></i> Đăng Nhập
                </button>

                <a href="index.html" class="back-link">
                    <i class="fas fa-arrow-left"></i> Quay lại trang chủ
                </a>
            </form>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');

        // Mock staff data - không cần Firebase
        const mockStaffDatabase = {
            'admin': {
                username: 'admin',
                password: '123456',
                name: 'Quản Trị Viên',
                role: 'staff'
            },
            'staff1': {
                username: 'staff1',
                password: '123456',
                name: 'Nhân Viên 1',
                role: 'staff'
            }
        };

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            console.log('Login attempt:', username);

            // Kiểm tra credentials
            if (mockStaffDatabase[username] && mockStaffDatabase[username].password === password) {
                console.log('Login successful!');
                
                // Lưu session vào localStorage
                const staffData = mockStaffDatabase[username];
                const session = {
                    username: staffData.username,
                    name: staffData.name,
                    role: staffData.role,
                    timestamp: Date.now()
                };
                
                localStorage.setItem('staffSession', JSON.stringify(session));
                console.log('Session saved:', session);
                
                // Redirect đến staff page
                alert('Đăng nhập thành công! (Local Mode)');
                window.location.href = 'staff.html';
            } else {
                console.log('Login failed');
                loginError.querySelector('span').textContent = 'Tên đăng nhập hoặc mật khẩu không đúng!';
                loginError.style.display = 'flex';
                setTimeout(() => {
                    loginError.style.display = 'none';
                }, 3000);
            }
        });
    </script>
</body>
</html>
